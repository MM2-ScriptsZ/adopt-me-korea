<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Adopt Me Korea - Game Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #07090f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Fake Browser Chrome */
        .fake-chrome {
            background: #1a1d2e;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid #2a2e45;
            flex-shrink: 0;
        }

        .chrome-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .window-buttons {
            display: flex;
            gap: 8px;
        }

        .win-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .win-red { background: #ff5f56; }
        .win-yellow { background: #ffbd2e; }
        .win-green { background: #27c93f; }

        .nav-controls {
            display: flex;
            gap: 10px;
        }

        .nav-icon {
            background: #2a2e45;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .nav-icon:hover {
            background: #E81F76;
        }

        .address-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: #0f1119;
            border-radius: 32px;
            padding: 6px 16px;
            border: 1px solid #2a2e45;
            min-width: 200px;
        }

        .lock {
            color: #2ED9C3;
            font-size: 12px;
            margin-right: 10px;
        }

        #fakeUrl {
            background: transparent;
            border: none;
            color: #f2f4fc;
            font-size: 13px;
            flex: 1;
            outline: none;
            font-family: monospace;
        }

        .secure-badge {
            background: #2a2e45;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 600;
            color: #2ED9C3;
            margin-left: 8px;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action {
            background: #E81F76;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action:hover {
            background: #bf1460;
        }

        .action.secondary {
            background: #2a2e45;
            border: 1px solid #E81F76;
        }

        .action.secondary:hover {
            background: #E81F76;
        }

        .close-btn {
            background: #e84c3d;
        }

        .close-btn:hover {
            background: #c73a2c;
        }

        /* Iframe Container */
        .iframe-wrapper {
            flex: 1;
            position: relative;
            background: #fff;
        }

        #gameFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loader-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,12,21,0.95);
            backdrop-filter: blur(12px);
            padding: 16px 32px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 10;
            border: 1px solid rgba(232,31,118,0.5);
            pointer-events: none;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(232,31,118,0.3);
            border-top-color: #E81F76;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 700px) {
            .window-buttons { display: none; }
            .action { padding: 4px 12px; font-size: 10px; }
            .address-wrapper { padding: 4px 12px; }
            .secure-badge { display: none; }
            .nav-icon { width: 28px; height: 28px; font-size: 12px; }
            .fake-chrome { padding: 8px 12px; }
        }
    </style>
</head>
<body>

<div class="fake-chrome">
    <div class="chrome-controls">
        <div class="window-buttons">
            <div class="win-btn win-red"></div>
            <div class="win-btn win-yellow"></div>
            <div class="win-btn win-green"></div>
        </div>
        <div class="nav-controls">
            <button class="nav-icon" id="backBtn" title="Back">◀</button>
            <button class="nav-icon" id="forwardBtn" title="Forward">▶</button>
            <button class="nav-icon" id="reloadBtn" title="Reload">⟳</button>
            <button class="nav-icon" id="homeBtn" title="Home">🏠</button>
        </div>
        <div class="address-wrapper">
            <span class="lock">🔒</span>
            <input type="text" id="fakeUrl" value="https://www.roblox.com/games/920587237/Adopt-Me" spellcheck="false">
            <span class="secure-badge">SECURE</span>
        </div>
        <div class="action-btns">
            <button class="action" id="goBtn">GO</button>
            <button class="action secondary" id="bypassBtn">⚡ BYPASS</button>
            <button class="action close-btn" id="closeBtn">✕ EXIT</button>
        </div>
    </div>
</div>

<div class="iframe-wrapper">
    <div id="loaderModal" class="loader-modal" style="display: flex;">
        <div class="spinner"></div>
        <span>Connecting to Korean Private Server ...</span>
    </div>
    <iframe id="gameFrame" title="Adopt Me Korea Server" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-popups-to-escape-sandbox allow-storage-access-by-user-activation allow-top-navigation-by-user-activation"></iframe>
</div>

<script src="proxy.js"></script>
<script>
    const PRIVATE_SERVER_URL = "https://www.roblox.com/games/920587237/Adopt-Me";
    
    const iframe = document.getElementById('gameFrame');
    const fakeUrlInput = document.getElementById('fakeUrl');
    const loaderModal = document.getElementById('loaderModal');
    
    const backBtn = document.getElementById('backBtn');
    const forwardBtn = document.getElementById('forwardBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const homeBtn = document.getElementById('homeBtn');
    const goBtn = document.getElementById('goBtn');
    const bypassBtn = document.getElementById('bypassBtn');
    const closeBtn = document.getElementById('closeBtn');
    
    let historyStack = [PRIVATE_SERVER_URL];
    let currentIndex = 0;
    
    function showToast(message, duration = 1800) {
        let toast = document.querySelector('.custom-toast');
        if(toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'custom-toast';
        toast.innerText = message;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#1a1d2e';
        toast.style.backdropFilter = 'blur(20px)';
        toast.style.color = '#fff';
        toast.style.padding = '8px 20px';
        toast.style.borderRadius = '40px';
        toast.style.fontSize = '12px';
        toast.style.fontWeight = '500';
        toast.style.border = '1px solid rgba(232,31,118,0.5)';
        toast.style.zIndex = '2000';
        toast.style.fontFamily = 'monospace';
        toast.style.whiteSpace = 'nowrap';
        toast.style.maxWidth = '90vw';
        toast.style.overflow = 'hidden';
        toast.style.textOverflow = 'ellipsis';
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, duration);
    }
    
    function showLoader(show, customMsg = "Connecting to Korean Private Server ...") {
        if(show) {
            const span = loaderModal.querySelector('span');
            if(span) span.innerText = customMsg;
            loaderModal.style.display = 'flex';
        } else {
            loaderModal.style.opacity = '0';
            setTimeout(() => {
                loaderModal.style.display = 'none';
                loaderModal.style.opacity = '1';
                const span = loaderModal.querySelector('span');
                if(span) span.innerText = "Connecting to Korean Private Server ...";
            }, 200);
        }
    }
    
    async function loadWithBypass(targetUrl) {
        if(!targetUrl || targetUrl.trim() === "") targetUrl = PRIVATE_SERVER_URL;
        fakeUrlInput.value = targetUrl;
        showLoader(true, "Bypassing security & loading server...");
        
        try {
            const html = await window.ProxyHelper.fetchPage(targetUrl);
            iframe.srcdoc = html;
            iframe.onload = () => {
                showLoader(false);
                showToast(`✅ Connected to Korean Server`, 1500);
                if(historyStack[currentIndex] !== targetUrl) {
                    if(currentIndex < historyStack.length - 1) {
                        historyStack = historyStack.slice(0, currentIndex + 1);
                    }
                    historyStack.push(targetUrl);
                    currentIndex = historyStack.length - 1;
                }
            };
            setTimeout(() => {
                if(loaderModal.style.display === 'flex') {
                    showLoader(false);
                    showToast(`Server gateway active`, 1200);
                }
            }, 6000);
        } catch(error) {
            console.warn("Fetch bypass error:", error);
            showLoader(false);
            iframe.src = targetUrl;
            iframe.onload = () => {
                showToast(`Connected via direct gateway`, 1500);
                if(historyStack[currentIndex] !== targetUrl) {
                    if(currentIndex < historyStack.length - 1) {
                        historyStack = historyStack.slice(0, currentIndex + 1);
                    }
                    historyStack.push(targetUrl);
                    currentIndex = historyStack.length - 1;
                }
            };
        }
    }
    
    function navigateTo(url) {
        if(!url.startsWith('http')) url = 'https://' + url;
        try { new URL(url); } catch(e) { url = PRIVATE_SERVER_URL; }
        fakeUrlInput.value = url;
        if(url.includes('roblox.com')) {
            loadWithBypass(url);
        } else {
            showLoader(true, "Loading page...");
            iframe.src = url;
            iframe.onload = () => {
                showLoader(false);
                if(historyStack[currentIndex] !== url) {
                    if(currentIndex < historyStack.length - 1) {
                        historyStack = historyStack.slice(0, currentIndex + 1);
                    }
                    historyStack.push(url);
                    currentIndex = historyStack.length - 1;
                }
            };
            setTimeout(() => {
                if(loaderModal.style.display === 'flex') showLoader(false);
            }, 5000);
        }
    }
    
    function goHome() {
        navigateTo(PRIVATE_SERVER_URL);
    }
    
    function exitGame() {
        window.location.href = "/";
    }
    
    goBtn.addEventListener('click', () => {
        let newUrl = fakeUrlInput.value.trim();
        if(!newUrl) newUrl = PRIVATE_SERVER_URL;
        navigateTo(newUrl);
    });
    
    backBtn.addEventListener('click', () => {
        if(currentIndex > 0) {
            currentIndex--;
            navigateTo(historyStack[currentIndex]);
        } else {
            showToast("No previous page", 1000);
        }
    });
    
    forwardBtn.addEventListener('click', () => {
        if(currentIndex < historyStack.length - 1) {
            currentIndex++;
            navigateTo(historyStack[currentIndex]);
        } else {
            showToast("No forward page", 1000);
        }
    });
    
    reloadBtn.addEventListener('click', () => {
        if(historyStack[currentIndex]) {
            navigateTo(historyStack[currentIndex]);
        } else {
            navigateTo(PRIVATE_SERVER_URL);
        }
    });
    
    homeBtn.addEventListener('click', goHome);
    
    bypassBtn.addEventListener('click', () => {
        showToast("⚡ Force reload with bypass", 1200);
        loadWithBypass(PRIVATE_SERVER_URL);
        if(historyStack[currentIndex] !== PRIVATE_SERVER_URL) {
            historyStack.push(PRIVATE_SERVER_URL);
            currentIndex = historyStack.length - 1;
        }
        fakeUrlInput.value = PRIVATE_SERVER_URL;
    });
    
    closeBtn.addEventListener('click', exitGame);
    
    fakeUrlInput.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') goBtn.click();
    });
    
    document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape') exitGame();
    });
    
    iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-popups-to-escape-sandbox allow-storage-access-by-user-activation allow-top-navigation-by-user-activation');
    
    loadWithBypass(PRIVATE_SERVER_URL);
</script>

</body>
</html>
