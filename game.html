<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Adopt Me Korea - Game Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #07090f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .fake-chrome {
            background: #1a1d2e;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid #2a2e45;
            flex-shrink: 0;
        }

        .chrome-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .window-buttons {
            display: flex;
            gap: 8px;
        }

        .win-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .win-red { background: #ff5f56; }
        .win-yellow { background: #ffbd2e; }
        .win-green { background: #27c93f; }

        .nav-controls {
            display: flex;
            gap: 10px;
        }

        .nav-icon {
            background: #2a2e45;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .nav-icon:hover {
            background: #E81F76;
        }

        .address-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: #0f1119;
            border-radius: 32px;
            padding: 6px 16px;
            border: 1px solid #2a2e45;
            min-width: 200px;
        }

        .lock {
            color: #2ED9C3;
            font-size: 12px;
            margin-right: 10px;
        }

        #fakeUrl {
            background: transparent;
            border: none;
            color: #f2f4fc;
            font-size: 13px;
            flex: 1;
            outline: none;
            font-family: monospace;
        }

        .secure-badge {
            background: #2a2e45;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 600;
            color: #2ED9C3;
            margin-left: 8px;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action {
            background: #E81F76;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action:hover {
            background: #bf1460;
        }

        .action.secondary {
            background: #2a2e45;
            border: 1px solid #E81F76;
        }

        .action.secondary:hover {
            background: #E81F76;
        }

        .close-btn {
            background: #e84c3d;
        }

        .close-btn:hover {
            background: #c73a2c;
        }

        .iframe-wrapper {
            flex: 1;
            position: relative;
            background: #fff;
        }

        #gameFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loader-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,12,21,0.95);
            backdrop-filter: blur(12px);
            padding: 16px 32px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 10;
            border: 1px solid rgba(232,31,118,0.5);
            pointer-events: none;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(232,31,118,0.3);
            border-top-color: #E81F76;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 700px) {
            .window-buttons { display: none; }
            .action { padding: 4px 12px; font-size: 10px; }
            .address-wrapper { padding: 4px 12px; }
            .secure-badge { display: none; }
            .nav-icon { width: 28px; height: 28px; font-size: 12px; }
            .fake-chrome { padding: 8px 12px; }
        }
    </style>
</head>
<body>

<div class="fake-chrome">
    <div class="chrome-controls">
        <div class="window-buttons">
            <div class="win-btn win-red"></div>
            <div class="win-btn win-yellow"></div>
            <div class="win-btn win-green"></div>
        </div>
        <div class="nav-controls">
            <button class="nav-icon" id="backBtn" title="Back">◀</button>
            <button class="nav-icon" id="forwardBtn" title="Forward">▶</button>
            <button class="nav-icon" id="reloadBtn" title="Reload">⟳</button>
            <button class="nav-icon" id="homeBtn" title="Home">🏠</button>
        </div>
        <div class="address-wrapper">
            <span class="lock">🔒</span>
            <input type="text" id="fakeUrl" value="https://www.roblox.com/games/920587237/Adopt-Me" spellcheck="false">
            <span class="secure-badge">SECURE</span>
        </div>
        <div class="action-btns">
            <button class="action" id="goBtn">GO</button>
            <button class="action secondary" id="bypassBtn">⚡ BYPASS</button>
            <button class="action close-btn" id="closeBtn">✕ EXIT</button>
        </div>
    </div>
</div>

<div class="iframe-wrapper">
    <div id="loaderModal" class="loader-modal" style="display: flex;">
        <div class="spinner"></div>
        <span>Loading Roblox Game...</span>
    </div>
    <iframe id="gameFrame" title="Adopt Me Korea Server" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-popups-to-escape-sandbox allow-storage-access-by-user-activation allow-top-navigation-by-user-activation"></iframe>
</div>

<script src="proxy.js"></script>
<script>
    const PRIVATE_SERVER_URL = "https://www.roblox.com/games/920587237/Adopt-Me";
    
    const iframe = document.getElementById('gameFrame');
    const fakeUrlInput = document.getElementById('fakeUrl');
    const loaderModal = document.getElementById('loaderModal');
    
    const backBtn = document.getElementById('backBtn');
    const forwardBtn = document.getElementById('forwardBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const homeBtn = document.getElementById('homeBtn');
    const goBtn = document.getElementById('goBtn');
    const bypassBtn = document.getElementById('bypassBtn');
    const closeBtn = document.getElementById('closeBtn');
    
    let historyStack = [PRIVATE_SERVER_URL];
    let currentIndex = 0;
    
    function hideLoader() {
        loaderModal.style.display = 'none';
    }
    
    function showLoader() {
        loaderModal.style.display = 'flex';
    }
    
    async function loadWithBypass(targetUrl) {
        if(!targetUrl || targetUrl.trim() === "") targetUrl = PRIVATE_SERVER_URL;
        fakeUrlInput.value = targetUrl;
        showLoader();
        
        try {
            const html = await window.RobloxProxy.fetchPage(targetUrl);
            iframe.srcdoc = html;
            iframe.onload = function() {
                hideLoader();
                if(historyStack[currentIndex] !== targetUrl) {
                    if(currentIndex < historyStack.length - 1) {
                        historyStack = historyStack.slice(0, currentIndex + 1);
                    }
                    historyStack.push(targetUrl);
                    currentIndex = historyStack.length - 1;
                }
            };
            setTimeout(hideLoader, 5000);
        } catch(error) {
            console.warn("Fetch error:", error);
            hideLoader();
            iframe.src = targetUrl;
            iframe.onload = function() {
                if(historyStack[currentIndex] !== targetUrl) {
                    if(currentIndex < historyStack.length - 1) {
                        historyStack = historyStack.slice(0, currentIndex + 1);
                    }
                    historyStack.push(targetUrl);
                    currentIndex = historyStack.length - 1;
                }
            };
        }
    }
    
    function navigateTo(url) {
        if(!url.startsWith('http')) url = 'https://' + url;
        try { new URL(url); } catch(e) { url = PRIVATE_SERVER_URL; }
        fakeUrlInput.value = url;
        if(url.includes('roblox.com')) {
            loadWithBypass(url);
        } else {
            showLoader();
            iframe.src = url;
            iframe.onload = hideLoader;
            setTimeout(hideLoader, 5000);
        }
    }
    
    function exitGame() {
        window.location.href = "/";
    }
    
    goBtn.addEventListener('click', function() {
        let newUrl = fakeUrlInput.value.trim();
        if(!newUrl) newUrl = PRIVATE_SERVER_URL;
        navigateTo(newUrl);
    });
    
    backBtn.addEventListener('click', function() {
        if(currentIndex > 0) {
            currentIndex--;
            navigateTo(historyStack[currentIndex]);
        }
    });
    
    forwardBtn.addEventListener('click', function() {
        if(currentIndex < historyStack.length - 1) {
            currentIndex++;
            navigateTo(historyStack[currentIndex]);
        }
    });
    
    reloadBtn.addEventListener('click', function() {
        if(historyStack[currentIndex]) {
            navigateTo(historyStack[currentIndex]);
        } else {
            navigateTo(PRIVATE_SERVER_URL);
        }
    });
    
    homeBtn.addEventListener('click', function() {
        navigateTo(PRIVATE_SERVER_URL);
    });
    
    bypassBtn.addEventListener('click', function() {
        loadWithBypass(PRIVATE_SERVER_URL);
        if(historyStack[currentIndex] !== PRIVATE_SERVER_URL) {
            historyStack.push(PRIVATE_SERVER_URL);
            currentIndex = historyStack.length - 1;
        }
        fakeUrlInput.value = PRIVATE_SERVER_URL;
    });
    
    closeBtn.addEventListener('click', exitGame);
    
    fakeUrlInput.addEventListener('keypress', function(e) {
        if(e.key === 'Enter') goBtn.click();
    });
    
    document.addEventListener('keydown', function(e) {
        if(e.key === 'Escape') exitGame();
    });
    
    loadWithBypass(PRIVATE_SERVER_URL);
</script>
</body>
</html>
